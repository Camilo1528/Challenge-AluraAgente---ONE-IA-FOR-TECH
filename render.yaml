services:
  - type: web
    name: techstore-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install --no-cache-dir -r requirements.txt"
    startCommand: "cd backend && python -c 'import database; database.init_db()' && python seed_real_products.py && uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://neon-hamster-4ebf49.netlify.app"
